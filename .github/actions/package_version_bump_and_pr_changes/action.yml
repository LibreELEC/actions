name: automated-package-update
description: Update package version and create a pull request

inputs:
  PACKAGE_NAME:
    description: Package name to update
    required: true
  PACKAGE_VERSION:
    description: Version to update to; omit for self-versioning packages (repos, git-hash packages)
    required: false
  GH_APP_ID:
    description: GitHub App ID for authentication
    required: true
  GH_PRIVATE_KEY:
    description: GitHub App private key
    required: true
  WORKING_DIRECTORY:
    description: Working directory for checked out forked repository
    required: false
    default: pr-le
  FORK_REPOSITORY:
    description: Fork repository to checkout and use as PR head (owner/name)
    required: false
    default: LibreELEC/pr-le
  TARGET_REPOSITORY:
    description: Target repository for PR base (owner/name)
    required: false
    default: LibreELEC/LibreELEC.tv
  BASE_BRANCH:
    description: Branch to checkout from the fork and PR base branch on the target repository
    required: false
  LABELS:
    description: Comma-separated list of labels to apply to the created PR
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Create GitHub App Token
      id: app-token
      uses: actions/create-github-app-token@v3
      with:
        client-id: ${{ inputs.GH_APP_ID }}
        private-key: ${{ inputs.GH_PRIVATE_KEY }}
        owner: LibreELEC

    - name: Checkout target repository
      uses: actions/checkout@v6
      with:
        repository: ${{ inputs.TARGET_REPOSITORY }}
        ref: ${{ inputs.BASE_BRANCH }}
        token: ${{ steps.app-token.outputs.token }}
        path: ${{ inputs.WORKING_DIRECTORY }}

    - name: Configure fork remote
      shell: bash
      working-directory: ${{ inputs.WORKING_DIRECTORY }}
      run: |
        git remote rename origin upstream
        git remote add fork "https://github.com/${{ inputs.FORK_REPOSITORY }}.git"

    - name: Get GitHub App User ID
      id: get-user-id
      shell: bash
      run: echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "${GITHUB_OUTPUT}"
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token }}

    - name: Configure git
      shell: bash
      working-directory: ${{ inputs.WORKING_DIRECTORY }}
      run: |
        git config --global user.name '${{ steps.app-token.outputs.app-slug }}[bot]'
        git config --global user.email '${{ steps.get-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com'

    - name: Normalize version
      shell: bash
      working-directory: ${{ inputs.WORKING_DIRECTORY }}
      run: |
        # Shorten version if it is a git SHA-256 hash; also set full version variable
        PACKAGE_VERSION="${{ inputs.PACKAGE_VERSION }}"
        PACKAGE_VERSION_FULL="${{ inputs.PACKAGE_VERSION }}"
        if [[ "${PACKAGE_VERSION}" =~ ^[0-9a-fA-F]{40}$ ]]; then
          PACKAGE_VERSION="${PACKAGE_VERSION:0:7}"
        fi
        if [[ -z "${PACKAGE_VERSION}" ]]; then
          # No version supplied — self-versioning package (repo/git-hash).
          # Use a timestamp so the branch and PR title are still unique.
          PACKAGE_VERSION="$(date '+%Y%m%d-%H%M%S')"
        fi
        echo "PACKAGE_VERSION=${PACKAGE_VERSION}" >> ${GITHUB_ENV}
        echo "PACKAGE_VERSION_FULL=${PACKAGE_VERSION_FULL}" >> ${GITHUB_ENV}
        echo "PACKAGE_VERSION: ${PACKAGE_VERSION}"
        echo "PACKAGE_VERSION_FULL: ${PACKAGE_VERSION_FULL}"

    - name: Run update script
      shell: bash
      working-directory: ${{ inputs.WORKING_DIRECTORY }}
      run: |
        echo "running update for package..."
        echo "package name: ${{ inputs.PACKAGE_NAME }}"
        echo "package version: ${PACKAGE_VERSION_FULL}"
        # if there is no PACKAGE_VERSION_FULL call update package without version
        # caller handles the logic.
        if [[ -n "${PACKAGE_VERSION_FULL}" ]]; then
          ./tools/update-pkg "${{ inputs.PACKAGE_NAME }}" "${PACKAGE_VERSION_FULL}"
        else
          ./tools/update-pkg "${{ inputs.PACKAGE_NAME }}"
        fi

    - name: Push branch to fork
      shell: bash
      working-directory: ${{ inputs.WORKING_DIRECTORY }}
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
      run: |
        BRANCH="pr-automated/${{ inputs.PACKAGE_NAME }}-${PACKAGE_VERSION}"

        git checkout -b "${BRANCH}"

        if git ls-remote --exit-code --heads fork "${BRANCH}" >/dev/null 2>&1; then
          echo "Branch '${BRANCH}' already exists on fork. This change was already pushed before."
          echo "CHANGE_ALREADY_PUSHED=true" >> "${GITHUB_ENV}"
        else
          git push fork "${BRANCH}"
          echo "CHANGE_ALREADY_PUSHED=false" >> "${GITHUB_ENV}"
        fi

    - name: Create Pull Request via GraphQL
      shell: bash
      working-directory: ${{ inputs.WORKING_DIRECTORY }}
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
      run: |
        PKG='${{ inputs.PACKAGE_NAME }}'
        FORK_REPOSITORY='${{ inputs.FORK_REPOSITORY }}'
        FORK_OWNER="${FORK_REPOSITORY%%/*}"
        FORK_NAME="${FORK_REPOSITORY##*/}"
        TARGET_REPOSITORY='${{ inputs.TARGET_REPOSITORY }}'
        TARGET_OWNER="${TARGET_REPOSITORY%%/*}"
        TARGET_NAME="${TARGET_REPOSITORY##*/}"
        TARGET_REPOSITORY_QUERY='repository(owner: "'"${TARGET_OWNER}"'", name: "'"${TARGET_NAME}"'")'
        PR_TITLE="${PKG}: update package to ${PACKAGE_VERSION}"
        if [[ "${CHANGE_ALREADY_PUSHED}" == "true" ]]; then
          PR_SUMMARY_CELL="Already pushed in a previous run (no new PR created)"
        else
          BRANCH=$(git rev-parse --abbrev-ref HEAD)
          echo "BRANCH=${BRANCH}"

          REPO_ID=$(gh api graphql -f query='
            query {
              '"${TARGET_REPOSITORY_QUERY}"' {
                id
              }
            }' --jq '.data.repository.id')

          HEAD_REPO_ID=$(gh api graphql -f query='
            query {
              repository(owner: "'"${FORK_OWNER}"'", name: "'"${FORK_NAME}"'") {
                id
              }
            }' --jq '.data.repository.id')

          PR_BODY="${PR_TITLE}"
          PR_RESULT=$(gh api graphql -f query='
          mutation($repo: ID!, $headRepo: ID!, $head: String!, $base: String!, $title: String!, $body: String!) {
            createPullRequest(input: {
              repositoryId: $repo,
              headRepositoryId: $headRepo,
              baseRefName: $base,
              headRefName: $head,
              title: $title,
              body: $body
            }) {
              pullRequest {
                id
                url
              }
            }
          }' \
            -f repo="${REPO_ID}" \
            -f headRepo="${HEAD_REPO_ID}" \
            -f head="${BRANCH}" \
            -f base="${{ inputs.BASE_BRANCH }}" \
            -f title="${PR_TITLE}" \
            -f body="${PR_BODY}" \
            --jq '.data.createPullRequest.pullRequest')
          PR_URL=$(echo "${PR_RESULT}" | jq -r '.url')
          PR_NODE_ID=$(echo "${PR_RESULT}" | jq -r '.id')

          echo "Created pull request: ${PR_URL}"
          echo "PR_URL=${PR_URL}" >> "${GITHUB_ENV}"
          echo "PR_NODE_ID=${PR_NODE_ID}" >> "${GITHUB_ENV}"
          PR_SUMMARY_CELL="[${PR_TITLE}](${PR_URL})"
        fi

        echo "### 📌 Pull Request Status" >> "${GITHUB_STEP_SUMMARY}"
        {
          echo "| Package | Pull Request |"
          echo "|---------|--------------|"
          echo "| ${PKG} | ${PR_SUMMARY_CELL} |"
        } >> "${GITHUB_STEP_SUMMARY}"

    - name: Add labels to Pull Request
      if: env.CHANGE_ALREADY_PUSHED != 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
      run: |
        OS_VERSION=$(grep 'OS_VERSION=' '${{ inputs.WORKING_DIRECTORY }}/distributions/LibreELEC/version' | cut -d'"' -f2)
        COMMIT_MSG=$(git -C '${{ inputs.WORKING_DIRECTORY }}' log -1 --format="%s")
        LABELS='${{ inputs.LABELS }}'
        if [[ -n "${OS_VERSION}" ]]; then
          LABELS="${LABELS},LE ${OS_VERSION}"
        fi
        if echo "${COMMIT_MSG}" | grep -qE 'addon \([0-9]+\)$'; then
          LABELS="${LABELS},ADDONS"
        fi

        TARGET_REPOSITORY='${{ inputs.TARGET_REPOSITORY }}'
        TARGET_OWNER="${TARGET_REPOSITORY%%/*}"
        TARGET_NAME="${TARGET_REPOSITORY##*/}"

        LABEL_NAMES_JSON=$(echo "${LABELS}" | tr ',' '\n' | jq -R . | jq -s .)

        ALL_LABELS=$(gh api graphql -f query='
          query($owner: String!, $name: String!) {
            repository(owner: $owner, name: $name) {
              labels(first: 100) {
                nodes { id name }
              }
            }
          }' \
          -f owner="${TARGET_OWNER}" \
          -f name="${TARGET_NAME}" \
          --jq '.data.repository.labels.nodes')

        LABEL_IDS_JSON=$(echo "${ALL_LABELS}" | jq --argjson names "${LABEL_NAMES_JSON}" \
          '[.[] | select(.name | IN($names[])) | .id]')

        jq -n \
          --arg query 'mutation($labelableId: ID!, $labelIds: [ID!]!) {
            addLabelsToLabelable(input: {
              labelableId: $labelableId
              labelIds: $labelIds
            }) { clientMutationId }
          }' \
          --arg labelableId "${PR_NODE_ID}" \
          --argjson labelIds "${LABEL_IDS_JSON}" \
          '{query: $query, variables: {labelableId: $labelableId, labelIds: $labelIds}}' \
        | gh api graphql --input -
